<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Election</title>
    <style>
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
        }
        .header img {
            height: 100px;
            margin-right: 20px;
        }
        .header h1 {
            font-size: 48px;
            font-weight: bold;
        }
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            text-align: center;
            margin-top: 40px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            margin-right: 20px;
        }
        .buttons button {
            display: block;
            margin: 10px 0;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            color: #fff;
            background-color: #007bff; /* Blue */
            transition: background-color 0.3s ease;
        }
        .buttons button:hover {
            background-color: #0056b3; /* Darker blue */
        }
        .animation-image {
            width: 300px;
            border: 5px solid lightslategray; /* Bold border */
            border-radius: 20%; /* Rounded border */
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/logo.png" alt="College Logo">
        <h1>GOVERNMENT POLYTECHNIC WARANGAL</h1>
    </div>
    <h1 style="text-align: center;color: darkgreen;"><u>COLLEGE ELECTIONS</u></h1>
    <div class="content">
        <div class="buttons">
            <button onclick="location.href='participate.html'">Participate in Elections</button>
            <button onclick="location.href='view_results.html'">View Results</button>
        </div>
        <img src="images/election.png" alt="Election Image" class="animation-image">
    </div>
</body>
</html>
