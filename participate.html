<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participate in Elections</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('regbkgrd.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            position: relative;
        }

        /* Overlay for better contrast */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
            overflow-y: auto;
        }

        .content-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 600px;
            width: 100%;
            margin: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            font-size: 70px;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            font-weight: 500;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        button {
            position: relative;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            animation: slideIn 0.6s ease-out backwards;
        }

        button:nth-child(1) {
            animation-delay: 0.6s;
        }

        button:nth-child(2) {
            animation-delay: 0.75s;
        }

        button:nth-child(3) {
            animation-delay: 0.9s;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.4);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        button:nth-child(3):hover {
            box-shadow: 0 15px 35px rgba(240, 147, 251, 0.6);
        }

        button:active {
            transform: translateY(-2px) scale(1.01);
        }

        .button-icon {
            margin-right: 10px;
            font-size: 20px;
            vertical-align: middle;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0 15px 0;
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 18px;
            border-radius: 15px;
            margin-top: 25px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            animation: fadeIn 1s ease-out 1s both;
        }

        .info-card h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .info-card p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .content-wrapper {
                padding: 35px 25px;
            }

            h1 {
                font-size: 38px;
            }

            .icon-container {
                font-size: 55px;
            }

            button {
                font-size: 16px;
                padding: 14px 30px;
            }

            .subtitle {
                font-size: 15px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 32px;
            }

            .content-wrapper {
                padding: 28px 18px;
            }

            .icon-container {
                font-size: 50px;
            }

            button {
                font-size: 15px;
                padding: 13px 25px;
            }
        }

        @media (max-height: 700px) {
            .content-wrapper {
                padding: 30px 35px;
            }

            h1 {
                font-size: 40px;
                margin-bottom: 10px;
            }

            .icon-container {
                font-size: 55px;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 25px;
            }

            button {
                padding: 14px 30px;
                font-size: 16px;
            }

            .info-card {
                padding: 15px;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <div class="icon-container">🗳️</div>
            <h1>Registration</h1>
            <p class="subtitle">Choose an option to participate in elections</p>
            
            <div class="button-group">
                <button onclick="location.href='register.html'">
                    <span class="button-icon">📝</span>
                    Create New Voter Account
                </button>
                
                <button onclick="location.href='login.html'">
                    <span class="button-icon">🔐</span>
                    Login to Vote
                </button>

                <div class="divider">OR</div>
                
                <button onclick="location.href='index.html'">
                    <span class="button-icon">🏠</span>
                    Go to Home Page
                </button>
            </div>

            <div class="info-card">
                <h3>📌 Quick Guide</h3>
                <p>New users should register first. Existing users can login directly to cast their vote.</p>
            </div>
        </div>
    </div>

    <script>
        // Add ripple effect on button clicks
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const ripple = document.createElement('span');
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255, 255, 255, 0.5)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s ease-out';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add keyframe for ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
