<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participate in Elections</title>
       <style>
        body {
            background-image: url('regbkgrd.png'); /* Watermark background image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            color: #333;
        }
        button {
            display: block;
            margin: 20px;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            color: #fff;
            background-color: #3b95f5; /* Blue */
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3; /* Darker blue */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: rgb(161, 235, 14);">REGISTRATION</h1>
        <button onclick="location.href='register.html'">Register</button>
        <button onclick="location.href='login.html'">Login</button>
        <button onclick="location.href='index.html'">Go to Home Page</button>
    </div>
</body>
</html>
