        body {
    font-family: Arial, sans-serif;

    margin: 0;
    height: 100vh;
    display: flex;

    align-items: center; /* Center the container vertically */
}

.container {
    width: 100%;
    max-width: 400px; /* Adjust the width to make it more compact */
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.9); /* Semi-transparent background */

    text-align: center; /* Center-align text inside container */
}

h1 {

}

h2 {

}

form .category {
    margin-bottom: 20px;

}

form .category label {
    display: block; /* Ensure each label is on a new line */

}

form .category input[type="radio"] {

}

form .category button {
    display: block;
    width: 100%;
    max-width: 100px;
    margin: 10px auto;

form .category button:hover {

form .submit-button:hover {

}

button.home-button {
