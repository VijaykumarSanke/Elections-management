<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/vote.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* Overlay for better contrast */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 550px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 30px;
        }

        .vote-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 36px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .progress-container {
            margin: 20px 0 30px;
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s ease;
        }

        .step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .step.completed {
            background: #27ae60;
        }

        .category {
            text-align: left;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '📋';
            font-size: 28px;
        }

        .candidate-option {
            display: block;
            position: relative;
            margin: 12px 0;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .candidate-option:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .candidate-option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }

        .candidate-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .candidate-option label {
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #333;
        }

        .button-container {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            flex: 1;
            max-width: 200px;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: #fff;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
            flex: 1;
            max-width: 250px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.5);
        }

        .btn-home {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            margin-top: 15px;
            width: 100%;
            max-width: 250px;
        }

        .btn-home:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.1) 0%, rgba(34, 153, 84, 0.1) 100%);
            border-left: 4px solid #27ae60;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: #27ae60;
            font-weight: 500;
            display: none;
        }

        /* Loading state */
        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                max-width: 95%;
                padding: 30px 25px;
            }

            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 20px;
            }

            .vote-icon {
                font-size: 50px;
            }
        }
    </style>
    <script src="election.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="vote-icon">🗳️</div>
            <h1>Cast Your Vote</h1>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 33.33%"></div>
            </div>
            <div class="step-indicator">
                <div class="step active" id="step1"></div>
                <div class="step" id="step2"></div>
                <div class="step" id="step3"></div>
            </div>
        </div>

        <form id="voteForm" method="POST" action="vote.php">
            <div class="category" id="category1">
                <h2>Sports Incharge</h2>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category1" value="Akhil">
                        Akhil
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category1" value="Jashuva">
                        Jashuva
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category1" value="Rithwik">
                        Rithwik
                    </label>
                </div>
                <div class="error-message" id="error1">Please select a candidate</div>
                <div class="button-container">
                    <button type="button" class="btn btn-next" onclick="nextCategory(1)">
                        Next →
                    </button>
                </div>
            </div>

            <div class="category" id="category2" style="display: none;">
                <h2>Co-Curricular Activities Incharge</h2>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category2" value="Anjani">
                        Anjani
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category2" value="Roshitha">
                        Roshitha
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category2" value="Keerthi Sree">
                        Keerthi Sree
                    </label>
                </div>
                <div class="error-message" id="error2">Please select a candidate</div>
                <div class="button-container">
                    <button type="button" class="btn btn-next" onclick="nextCategory(2)">
                        Next →
                    </button>
                </div>
            </div>

            <div class="category" id="category3" style="display: none;">
                <h2>General Activity Incharge</h2>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category3" value="Shiva Mani">
                        Shiva Mani
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category3" value="Aksh">
                        Aksh
                    </label>
                </div>
                <div class="candidate-option">
                    <label>
                        <input type="radio" name="category3" value="Vijay Kumar">
                        Vijay Kumar
                    </label>
                </div>
                <div class="error-message" id="error3">Please select a candidate</div>
                <div class="button-container">
                    <button type="submit" class="btn btn-submit" id="submitBtn">
                        ✓ Submit Vote
                    </button>
                </div>
            </div>
        </form>

        <button class="btn btn-home" onclick="location.href='index.html'">
            🏠 Go to Home Page
        </button>
    </div>

    <script>
        // Add visual feedback for radio selection
        document.querySelectorAll('.candidate-option').forEach(option => {
            const radio = option.querySelector('input[type="radio"]');
            
            option.addEventListener('click', function() {
                // Remove selected class from siblings
                this.parentElement.querySelectorAll('.candidate-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                // Add selected class to clicked option
                this.classList.add('selected');
                radio.checked = true;
                
                // Hide error message
                const categoryNum = radio.name.replace('category', '');
                document.getElementById('error' + categoryNum).style.display = 'none';
            });
        });

        function nextCategory(current) {
            const radio = document.querySelector(`input[name="category${current}"]:checked`);
            const errorMsg = document.getElementById('error' + current);
            
            if (!radio) {
                errorMsg.style.display = 'block';
                return;
            }
            
            errorMsg.style.display = 'none';
            
            // Hide current category
            document.getElementById('category' + current).style.display = 'none';
            
            // Show next category
            const next = current + 1;
            document.getElementById('category' + next).style.display = 'block';
            
            // Update progress bar
            const progress = (next / 3) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            // Update step indicators
            document.getElementById('step' + current).classList.remove('active');
            document.getElementById('step' + current).classList.add('completed');
            document.getElementById('step' + next).classList.add('active');
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Form submission with validation
        document.getElementById('voteForm').addEventListener('submit', function(e) {
            const radio = document.querySelector('input[name="category3"]:checked');
            const errorMsg = document.getElementById('error3');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!radio) {
                e.preventDefault();
                errorMsg.style.display = 'block';
                return;
            }
            
            // Add loading state
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Submitting...';
        });
    </script>
</body>
</html>
