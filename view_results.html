<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/logbkgrd.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* Overlay for better contrast */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(102, 126, 234, 0.08);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
            }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            line-height: 1.3;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 20px;
            z-index: 2;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #888;
            transition: color 0.3s ease;
            user-select: none;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        form input[type="password"],
        form input[type="text"] {
            width: 100%;
            padding: 16px 50px 16px 50px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fff;
        }

        form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        form input::placeholder {
            color: #aaa;
        }

        .button-primary {
            width: 100%;
            padding: 16px;
            margin: 25px 0 15px 0;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .button-primary:hover::before {
            left: 100%;
        }

        .button-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .button-primary:active {
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #888;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .button-secondary {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid #667eea;
            color: #667eea;
            background-color: transparent;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .button-secondary:hover {
            background-color: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
        }

        .security-badge::before {
            content: '🔒';
            font-size: 16px;
        }

        /* Loading state */
        .loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                max-width: 95%;
                padding: 30px 25px;
            }

            h1 {
                font-size: 28px;
            }

            .icon-wrapper {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            📊
        </div>
        
        <h1>Election Results</h1>
        <p class="subtitle">Enter admin password to view results</p>

        <form method="POST" action="verify_password.php" id="resultsForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔐</span>
                    <input type="password" id="admin_password" name="admin_password" placeholder="Admin Password" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button type="submit" class="button-primary" id="submitBtn">
                View Results
            </button>
        </form>

        <div class="divider">OR</div>

        <button type="button" class="button-secondary" onclick="location.href='index.html'">
            🏠 Go to Home Page
        </button>

        <div class="security-badge">
            Admin access required
        </div>
    </div>

    <script>
        const form = document.getElementById('resultsForm');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('admin_password');

        // Toggle password visibility
        function togglePassword() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            const toggleBtn = document.querySelector('.toggle-password');
            toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
        }

        // Add form submission animation
        form.addEventListener('submit', function(e) {
            if (passwordInput.value.trim() === '') {
                e.preventDefault();
                passwordInput.style.borderColor = '#e74c3c';
                passwordInput.focus();
                
                setTimeout(() => {
                    passwordInput.style.borderColor = '#e0e0e0';
                }, 2000);
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Verifying...';
        });

        // Add focus animation to input
        passwordInput.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.02)';
            this.parentElement.style.transition = 'transform 0.3s ease';
        });

        passwordInput.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });

        // Add enter key support for better UX
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                form.requestSubmit();
            }
        });
    </script>
</body>
</html>
