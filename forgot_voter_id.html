<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Voter ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            position: relative;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Subtle background decoration */
        body::before {
            content: 'Forgot Voter ID';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 140px;
            font-weight: 900;
            color: rgba(102, 126, 234, 0.03);
            z-index: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            z-index: 1;
            position: relative;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
            z-index: 2;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #888;
            transition: color 0.3s ease;
            user-select: none;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        form input[type="text"],
        form input[type="password"] {
            width: 100%;
            padding: 14px 15px 14px 45px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fff;
        }

        form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        form input::placeholder {
            color: #aaa;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .button-primary {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .button-primary:hover::before {
            left: 100%;
        }

        .button-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .button-primary:active {
            transform: translateY(-1px);
        }

        .button-secondary {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid #667eea;
            color: #667eea;
            background-color: transparent;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .button-secondary:hover {
            background-color: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .info-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            padding: 15px;
            border-radius: 12px;
            margin-top: 25px;
            border-left: 4px solid #667eea;
            text-align: left;
        }

        .info-box-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box-text {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Loading state */
        .loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 540px) {
            .container {
                max-width: 95%;
                padding: 30px 25px;
            }

            h1 {
                font-size: 28px;
            }

            .icon-wrapper {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }

            .button-group {
                flex-direction: column;
            }

            body::before {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            🔍
        </div>
        
        <h1>Forgot Voter ID</h1>
        <p class="subtitle">Enter your roll number and password to retrieve your Voter ID</p>

        <form method="POST" action="forgot_voter_id.php" id="forgotForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🎓</span>
                    <input type="text" id="roll_no" name="roll_no" placeholder="Roll No (e.g., 22004-cs-001)" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Your Password" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="button-primary" id="submitBtn">
                    🔍 Retrieve Voter ID
                </button>
                <button type="button" class="button-secondary" onclick="location.href='login.html'">
                    ← Back to Login
                </button>
            </div>
        </form>

        <div class="info-box">
            <div class="info-box-title">
                💡 Help
            </div>
            <div class="info-box-text">
                Enter the same roll number and password you used during registration. Your Voter ID will be displayed after verification.
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const rollNoInput = document.getElementById('roll_no');

        // Toggle password visibility
        function togglePassword() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            const toggleBtn = document.querySelector('.toggle-password');
            toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
        }

        // Add form submission animation
        form.addEventListener('submit', function(e) {
            const rollNo = rollNoInput.value.trim();
            const password = passwordInput.value.trim();

            if (rollNo === '' || password === '') {
                e.preventDefault();
                
                if (rollNo === '') {
                    rollNoInput.style.borderColor = '#e74c3c';
                    rollNoInput.focus();
                }
                if (password === '') {
                    passwordInput.style.borderColor = '#e74c3c';
                }

                setTimeout(() => {
                    rollNoInput.style.borderColor = '#e0e0e0';
                    passwordInput.style.borderColor = '#e0e0e0';
                }, 2000);
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Retrieving...';
        });

        // Add focus animations
        [rollNoInput, passwordInput].forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.transition = 'transform 0.3s ease';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });

            input.addEventListener('input', function() {
                this.style.borderColor = '#e0e0e0';
            });
        });
    </script>
</body>
</html>
