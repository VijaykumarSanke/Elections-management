<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            position: relative;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: 'Registration';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 180px;
            font-weight: 900;
            color: rgba(102, 126, 234, 0.03);
            z-index: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            z-index: 1;
            position: relative;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 8px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #667eea;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="password"] {
            width: 100%;
            padding: 14px 15px 14px 45px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fff;
        }

        form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        form input::placeholder {
            color: #aaa;
        }

        form input.error {
            border-color: #e74c3c;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin: 5px 0 10px 8px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .button-primary {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .button-primary:hover:not(:disabled)::before {
            left: 100%;
        }

        .button-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .button-primary:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .button-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .button-secondary {
            flex: 1;
            padding: 13px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid #667eea;
            color: #667eea;
            background-color: transparent;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .button-secondary:hover {
            background-color: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #888;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            display: inline-block;
            color: #27ae60;
            margin-left: 5px;
            animation: scaleIn 0.3s;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .info-badge {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 13px;
            color: #667eea;
            text-align: left;
        }

        @media (max-width: 540px) {
            .container {
                max-width: 95%;
                padding: 30px 25px;
            }

            h1 {
                font-size: 30px;
            }

            .button-group {
                flex-direction: column;
            }

            body::before {
                font-size: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Register</h1>
        <form method="POST" action="send_otp.php" id="registrationForm" novalidate>
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" name="name" id="name" placeholder="Full Name" required>
                </div>
                <div class="error-message" id="name-error"></div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🎓</span>
                    <input type="text" name="roll_no" id="roll_no" placeholder="Roll No (e.g., 22071A1234)" required>
                </div>
                <div class="error-message" id="roll_no-error"></div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="error-message" id="email-error"></div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" id="password" placeholder="create Password (min 8 characters)" required>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔐</span>
                    <input type="password" name="eduprime_password" id="eduprime_password" placeholder="EduPrime Password (2FA)" required>
                </div>
                <div class="error-message" id="eduprime_password-error"></div>
            </div>

            <div class="info-badge">
                📧 An OTP will be sent to your email for verification
            </div>

            <button type="submit" id="submitBtn" class="button-primary">Send OTP</button>
        </form>

        <div class="divider">Already have an account?</div>

        <div class="button-group">
            <button type="button" class="button-secondary" onclick="location.href='login.html'">Login</button>
            <button type="button" class="button-secondary" onclick="location.href='index.html'">🏠 Home</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');

        const rollNoPattern = /^(22|23|24|25)\d{3}[A-Z]\d{4}$/;

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const errorEl = document.getElementById(this.id + '-error');
                if (errorEl) {
                    errorEl.textContent = '';
                }
                
                if (this.value.trim() !== '' && !this.classList.contains('error')) {
                    this.style.borderColor = '#27ae60';
                } else {
                    this.style.borderColor = '#e0e0e0';
                }
            });

            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.transition = 'transform 0.3s ease';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('input').forEach(el => {
                el.classList.remove('error');
                el.style.borderColor = '#e0e0e0';
            });

            let isValid = true;

            const name = document.getElementById('name');
            if (name.value.trim() === '') {
                showError('name', 'Name is required');
                isValid = false;
            } else if (name.value.trim().length < 2) {
                showError('name', 'Name must be at least 2 characters');
                isValid = false;
            }

            const rollNo = document.getElementById('roll_no');
            if (rollNo.value.trim() === '') {
                showError('roll_no', 'Roll number is required');
                isValid = false;
            } else if (!rollNoPattern.test(rollNo.value.trim())) {
                showError('roll_no', 'Invalid format. Example: 22071A1234, 23075A5678');
                isValid = false;
            }

            const email = document.getElementById('email');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email.value.trim() === '') {
                showError('email', 'Email is required');
                isValid = false;
            } else if (!emailPattern.test(email.value.trim())) {
                showError('email', 'Invalid email format');
                isValid = false;
            }

            const password = document.getElementById('password');
            if (password.value.trim() === '') {
                showError('password', 'Password is required');
                isValid = false;
            } else if (password.value.length < 8) {
                showError('password', 'Password must be at least 8 characters');
                isValid = false;
            }

            const eduprimePassword = document.getElementById('eduprime_password');
            if (eduprimePassword.value.trim() === '') {
                showError('eduprime_password', 'EduPrime password is required');
                isValid = false;
            }

            if (isValid) {
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Sending OTP...';
                
                setTimeout(() => {
                    form.submit();
                }, 300);
            } else {
                const firstError = document.querySelector('.error');
                if (firstError) {
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });

        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorEl = document.getElementById(fieldId + '-error');
            
            field.classList.add('error');
            if (errorEl) {
                errorEl.textContent = message;
            }
        }
    </script>
</body>
</html>
