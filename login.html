<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('images/logimg.png') no-repeat center center fixed; /* Add your background image */
            background-size: cover; /* Ensure the background image covers the entire page */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* Center the container horizontally */
            align-items: center; /* Center the container vertically */
        }

        .container {
            width: 100%;
            max-width: 300px; /* Reduced maximum width for smaller fields */
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9); /* Semi-transparent background */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            text-align: center; /* Center-align text inside container */
        }

        h1 {
            font-size: 28px; /* Slightly reduced font size */
            margin-bottom: 20px;
        }

        form input[type="text"],
        form input[type="password"] {
            display: block;
            width: calc(100% - 20px);
            padding: 10px; /* Reduced padding */
            margin: 10px auto;
            font-size: 16px; /* Reduced font size */
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form button,
        button {
            display: block;
            width: calc(100% - 20px);
            padding: 10px; /* Reduced padding */
            margin: 10px auto;
            font-size: 16px; /* Reduced font size */
            cursor: pointer;
            border: none;
            color: #fff;
            background-color: #007bff; /* Blue */
            transition: background-color 0.3s ease;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3; /* Darker blue */
        }

        .forgot-voter-id-button {
            color: #007bff;
            background-color: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 16px;
        }

        .forgot-voter-id-button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form method="POST" action="login.php">
            <input type="text" name="vote_id" placeholder="Voter ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <button onclick="location.href='index.html'">Go to Home Page</button>
        <a href="register.html">Not a user? Register now</a>
        <button class="forgot-voter-id-button" onclick="location.href='forgot_voter_id.html'">Forgot Voter ID?</button>
    </div>
</body>
</html>
